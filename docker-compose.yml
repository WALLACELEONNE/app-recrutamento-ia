version: '3.8'

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

# Âncora (YAML Anchor) para política centralizada de logs
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:15-alpine
    container_name: app_postgres
    env_file:
      - .env.development
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      app-network:
        aliases:
          - db
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-admin} -d $${POSTGRES_DB:-recrutamento_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: app_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      app-network:
        aliases:
          - cache
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  livekit:
    image: livekit/livekit-server:latest
    container_name: app_livekit
    command: --config /etc/livekit.yaml
    ports:
      - "127.0.0.1:7880:7880"
      - "127.0.0.1:7881:7881"
      - "127.0.0.1:7882:7882/udp"
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.development
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    networks:
      - app-network
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7880/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    # 'container_name' removido para permitir escalabilidade horizontal via CLI (ex: --scale server=3)
    # A porta do host "3000" foi removida daqui, pois o Nginx cuidará do proxy das requisições e a porta seria conflictante
    env_file:
      - .env.development
    networks:
      - app-network
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    # 'container_name' removido para permitir o balanceamento ou alta disponibilidade (ex: --scale worker=2)
    env_file:
      - .env.development
    networks:
      - app-network
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      livekit:
        condition: service_healthy
      postgres:
        condition: service_healthy

  analysis_worker:
    build:
      context: .
      dockerfile: Dockerfile.analysis_worker
    container_name: analysis_worker
    ports:
      - "4000:4000"
    env_file:
      - .env.development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      app-network:
        aliases:
          - analysis_api
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Nginx atuando como Reverse Proxy e Load Balancer para o backend (server)
  nginx:
    image: nginx:alpine
    container_name: app_nginx
    ports:
      - "127.0.0.1:3000:80" # Expõe Nginx na porta 3000 do host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - server
