name: "Bug Report"
description: "Create a report to help us improve"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reservar um tempo para reportar este bug!
  - type: textarea
    id: description
    attributes:
      label: Descrição do Problema
      description: Uma descrição clara e concisa de qual é o bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para Reproduzir
      description: Passos para reproduzir o comportamento (ex: 1. Acessar '...', 2. Clicar em '...', 3. Erro na tela)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento Esperado
      description: Uma descrição clara e concisa do que você esperava que acontecesse.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Ambiente
      description: Sistema Operacional, Versão do Go, Versão do Docker, etc.
    validations:
      required: false
