<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4F46E5">
    <meta name="description" content="Plataforma de Entrevista Imersiva por Inteligência Artificial">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nova Voice">
    
    <title>Entrevista Offline - Nova Voice AI</title>
    
    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/img/icon-192x192.png">
    
    <style>
        body {
            background-color: #0F172A; /* slate-900 */
            color: #F8FAFC; /* slate-50 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            background-color: #1E293B; /* slate-800 */
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #F8FAFC;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #94A3B8; /* slate-400 */
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .btn {
            background-color: #4F46E5; /* indigo-600 */
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #4338CA; /* indigo-700 */
        }
        .icon-container {
            margin-bottom: 1.5rem;
            color: #E11D48; /* rose-600 */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m2 2 20 20"/>
                <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.56-2.63-1.46-3.54l-1.58 1.58a.5.5 0 0 1-.7.7l-1.58 1.58c-.91.91-1.46 2.16-1.46 3.54a2.5 2.5 0 0 0 2.5 2.5h2.5"/>
                <path d="M15.5 9.5A2.5 2.5 0 0 0 13 12c0 1.38.56 2.63 1.46 3.54l1.58-1.58a.5.5 0 0 1 .7-.7l1.58-1.58c.91-.91 1.46-2.16 1.46-3.54a2.5 2.5 0 0 0-2.5-2.5h-2.5"/>
            </svg>
        </div>
        <h1>Você está offline</h1>
        <p>A sua conexão com a internet foi perdida. Não se preocupe, o andamento da sua entrevista está salvo no servidor.</p>
        <button class="btn" onclick="window.location.reload()">Tentar Reconectar</button>
    </div>
</body>
</html>
